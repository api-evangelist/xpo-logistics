aid: xpo-logistics
name: XPO Logistics
description: >-
  XPO Logistics, Inc. is a leading provider of less-than-truckload (LTL) transportation in
  North America. The company offers freight transportation through a proprietary network of
  service centers and uses technology to drive efficiency for more than 50,000 customers.
  XPO Logistics historically operated as part of XPO, Inc. (NYSE: XPO), the publicly traded
  company that spun off GXO Logistics (contract logistics) in 2021 and RXO (brokerage) in
  2022, leaving XPO focused on LTL trucking. XPO Logistics does not currently publish a
  public developer API or developer portal; integrations are arranged through enterprise
  account managers.
